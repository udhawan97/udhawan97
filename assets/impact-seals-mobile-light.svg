<svg xmlns="http://www.w3.org/2000/svg" width="720" height="530" viewBox="0 0 720 530" role="img" aria-labelledby="title desc">
  <title id="title">Client impact at a glance</title>
  <desc id="desc">Four certification seals: a retail platform shipped to over 100 locations, zero findings on a federal cloud audit, quality leadership across four cloud products, and delivery with teams on three continents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="720" y2="530" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF6EC"/><stop offset="0.58" stop-color="#F5EEDD"/><stop offset="1" stop-color="#EDE2C7"/>
    </linearGradient>
    <linearGradient id="seal" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FBF7EC"/><stop offset="1" stop-color="#F0E6CE"/>
    </linearGradient>
    <clipPath id="frameClip"><rect width="720" height="530" rx="28"/></clipPath>
    <style>
      .seal { transform-box: fill-box; transform-origin: center; animation: press 7.2s ease-in-out infinite; }
      .seal.s2 { animation-delay: .5s; } .seal.s3 { animation-delay: 1s; } .seal.s4 { animation-delay: 1.5s; }
      .dash { transform-box: fill-box; transform-origin: center; animation: turn 40s linear infinite; }
      @keyframes press { 0%, 88%, 100% { transform: scale(1); } 93% { transform: scale(1.035); } }
      @keyframes turn { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { .seal, .dash { animation: none; } }
    </style>
  </defs>
  <g clip-path="url(#frameClip)"><rect width="720" height="530" fill="url(#bg)"/></g>
  <rect x="0.75" y="0.75" width="718.5" height="528.5" rx="27.25" fill="none" stroke="#1E1B16" stroke-opacity="0.14" stroke-width="1.5"/>
  <line x1="42" y1="32" x2="678" y2="32" stroke="#9C7A12" stroke-opacity="0.55" stroke-width="1.5"/>
  <text x="42" y="62" fill="#2B271F" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" letter-spacing="1.5">CLIENT IMPACT</text>
  <text x="678" y="62" fill="#8A7F63" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" letter-spacing="1.2" text-anchor="end">CERTIFIED BY AUDIT, NOT BY VIBES</text>
  <g class="seal s1">
    <circle cx="200" cy="170" r="58" fill="url(#seal)" stroke="#9C7A12" stroke-opacity="0.95" stroke-width="1.8"/>
    <circle class="dash" cx="200" cy="170" r="50" fill="none" stroke="#9C7A12" stroke-opacity="0.4" stroke-width="1.1" stroke-dasharray="2 5"/>
    <text x="200" y="180.8" fill="#1E1B16" font-family="Georgia, 'Times New Roman', serif" font-size="31" font-weight="600" letter-spacing="-0.5" text-anchor="middle">100+</text>
  </g>
  <text x="200" y="262" fill="#2B271F" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800" letter-spacing="1.2" text-anchor="middle">LOCATIONS</text>
  <text x="200" y="283" fill="#6B6558" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">retail platform shipped</text>
  <g class="seal s2">
    <circle cx="520" cy="170" r="58" fill="url(#seal)" stroke="#A23A22" stroke-opacity="0.95" stroke-width="1.8"/>
    <circle class="dash" cx="520" cy="170" r="50" fill="none" stroke="#A23A22" stroke-opacity="0.4" stroke-width="1.1" stroke-dasharray="2 5"/>
    <text x="520" y="180.8" fill="#1E1B16" font-family="Georgia, 'Times New Roman', serif" font-size="31" font-weight="600" letter-spacing="-0.5" text-anchor="middle">Zero</text>
  </g>
  <text x="520" y="262" fill="#2B271F" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800" letter-spacing="1.2" text-anchor="middle">AUDIT FINDINGS</text>
  <text x="520" y="283" fill="#6B6558" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">federal cloud delivery</text>
  <g class="seal s3">
    <circle cx="200" cy="380" r="58" fill="url(#seal)" stroke="#46527A" stroke-opacity="0.95" stroke-width="1.8"/>
    <circle class="dash" cx="200" cy="380" r="50" fill="none" stroke="#46527A" stroke-opacity="0.4" stroke-width="1.1" stroke-dasharray="2 5"/>
    <text x="200" y="393.3" fill="#1E1B16" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="600" letter-spacing="-0.5" text-anchor="middle">4</text>
  </g>
  <text x="200" y="472" fill="#2B271F" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800" letter-spacing="1.2" text-anchor="middle">CLOUD PRODUCTS</text>
  <text x="200" y="493" fill="#6B6558" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">quality leadership</text>
  <g class="seal s4">
    <circle cx="520" cy="380" r="58" fill="url(#seal)" stroke="#9C7A12" stroke-opacity="0.95" stroke-width="1.8"/>
    <circle class="dash" cx="520" cy="380" r="50" fill="none" stroke="#9C7A12" stroke-opacity="0.4" stroke-width="1.1" stroke-dasharray="2 5"/>
    <text x="520" y="393.3" fill="#1E1B16" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="600" letter-spacing="-0.5" text-anchor="middle">3</text>
  </g>
  <text x="520" y="472" fill="#2B271F" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800" letter-spacing="1.2" text-anchor="middle">CONTINENTS</text>
  <text x="520" y="493" fill="#6B6558" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">teams shipped with</text>
</svg>
