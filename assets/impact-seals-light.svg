<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="252" viewBox="0 0 1200 252" role="img" aria-labelledby="title desc">
  <title id="title">Client impact at a glance</title>
  <desc id="desc">Four certification seals: a retail platform shipped to over 100 locations, zero findings on a federal cloud audit, quality leadership across four cloud products, and delivery with teams on three continents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="252" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF6EC"/><stop offset="0.58" stop-color="#F5EEDD"/><stop offset="1" stop-color="#EDE2C7"/>
    </linearGradient>
    <linearGradient id="seal" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FBF7EC"/><stop offset="1" stop-color="#F0E6CE"/>
    </linearGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%" filterUnits="objectBoundingBox">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="3" seed="11" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="d"/>
      <feComponentTransfer in="d" result="c"><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite in="c" in2="SourceGraphic" operator="in"/>
    </filter>
    <clipPath id="frameClip"><rect width="1200" height="252" rx="28"/></clipPath>
    <style>
      @font-face {
        font-family: 'FrauncesMast';
        src: url(data:font/woff2;base64,) format('woff2');
        font-weight: 600; font-display: block;
      }
      .mast { font-family: 'FrauncesMast', Georgia, 'Times New Roman', serif; }

      .in-rule, .in-head, .seal-in, .cap-in { transform-box: fill-box; }
      .in-rule { animation: draw-rule .72s cubic-bezier(.22,.61,.36,1) backwards; }
      .in-head { animation: rise .5s cubic-bezier(.22,.61,.36,1) .2s backwards; }
      /* Each seal presses in, then keeps a slow ambient beat. */
      .seal-in { transform-origin: center; animation: stamp .52s cubic-bezier(.34,1.3,.64,1) backwards; }
      .cap-in  { animation: rise .45s cubic-bezier(.22,.61,.36,1) backwards; }
      .s1 { animation-delay: .42s; } .s2 { animation-delay: .56s; }
      .s3 { animation-delay: .70s; } .s4 { animation-delay: .84s; }
      .c1 { animation-delay: .60s; } .c2 { animation-delay: .74s; }
      .c3 { animation-delay: .88s; } .c4 { animation-delay: 1.02s; }
      .dash { transform-box: fill-box; transform-origin: center; animation: turn 44s linear 1.2s infinite; }
      .beat { transform-box: fill-box; transform-origin: center; animation: beat 7.2s ease-in-out 1.4s infinite; }
      .beat.b2 { animation-delay: 1.9s; } .beat.b3 { animation-delay: 2.4s; } .beat.b4 { animation-delay: 2.9s; }

      @keyframes draw-rule { from { stroke-dashoffset: var(--len); } to { stroke-dashoffset: 0; } }
      @keyframes rise  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
      @keyframes stamp { from { opacity: 0; transform: scale(1.5); } to { opacity: 1; transform: none; } }
      @keyframes turn  { to { transform: rotate(360deg); } }
      @keyframes beat  { 0%, 88%, 100% { transform: scale(1); } 93% { transform: scale(1.035); } }

      @media (prefers-reduced-motion: reduce) {
        .in-rule, .in-head, .seal-in, .cap-in, .dash, .beat { animation: none; }
        .in-rule { stroke-dashoffset: 0; }
      }
    </style></defs>
  <g clip-path="url(#frameClip)"><rect width="1200" height="252" fill="url(#bg)"/></g>
  <rect x="0.75" y="0.75" width="1198.5" height="250.5" rx="27.25" fill="none" stroke="#1E1B16" stroke-opacity="0.14" stroke-width="1.5"/>
  <line class="in-rule" x1="56" y1="31" x2="1144" y2="31" stroke="#9C7A12" stroke-opacity="0.55" stroke-width="1.5"
        stroke-dasharray="1088" style="--len:1088"/>
  <g class="in-head" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="56" y="60" fill="#2B271F" font-size="12" font-weight="800" letter-spacing="1.5">CLIENT IMPACT · CERTIFIED BY AUDIT, NOT BY VIBES</text>
    <text x="1144" y="60" fill="#8A7F63" font-size="10.5" font-weight="700" letter-spacing="1.3" text-anchor="end">EY STUDIO+ · 2022—NOW</text>
  </g>
  <g class="seal-in s1">
    <g class="beat b1">
      <circle cx="192" cy="132" r="46" fill="url(#seal)" stroke="#9C7A12" stroke-opacity="0.95" stroke-width="1.6"/>
      <circle class="dash" cx="192" cy="132" r="39" fill="none" stroke="#9C7A12" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="2 4"/>
      <text class="mast" x="192" y="142.2" fill="#FFFFFF" fill-opacity="0.5" font-size="25" font-weight="600" letter-spacing="-0.5" text-anchor="middle" aria-hidden="true">100+</text>
      <text class="mast" x="192" y="140.8" fill="#1E1B16" font-size="25" font-weight="600" letter-spacing="-0.5" text-anchor="middle">100+</text>
    </g>
  </g>
  <g class="cap-in c1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="192" y="208" fill="#2B271F" font-size="11.5" font-weight="800" letter-spacing="1.3" text-anchor="middle">LOCATIONS</text>
    <text x="192" y="227" fill="#6B6558" font-size="11.5" text-anchor="middle">retail platform shipped</text>
  </g>
  <g class="seal-in s2">
    <g class="beat b2">
      <circle cx="464" cy="132" r="46" fill="url(#seal)" stroke="#A23A22" stroke-opacity="0.95" stroke-width="1.6"/>
      <circle class="dash" cx="464" cy="132" r="39" fill="none" stroke="#A23A22" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="2 4"/>
      <text class="mast" x="464" y="142.2" fill="#FFFFFF" fill-opacity="0.5" font-size="25" font-weight="600" letter-spacing="-0.5" text-anchor="middle" aria-hidden="true">Zero</text>
      <text class="mast" x="464" y="140.8" fill="#1E1B16" font-size="25" font-weight="600" letter-spacing="-0.5" text-anchor="middle">Zero</text>
    </g>
  </g>
  <g class="cap-in c2" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="464" y="208" fill="#2B271F" font-size="11.5" font-weight="800" letter-spacing="1.3" text-anchor="middle">AUDIT FINDINGS</text>
    <text x="464" y="227" fill="#6B6558" font-size="11.5" text-anchor="middle">federal cloud delivery</text>
  </g>
  <g class="seal-in s3">
    <g class="beat b3">
      <circle cx="736" cy="132" r="46" fill="url(#seal)" stroke="#46527A" stroke-opacity="0.95" stroke-width="1.6"/>
      <circle class="dash" cx="736" cy="132" r="39" fill="none" stroke="#46527A" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="2 4"/>
      <text class="mast" x="736" y="143.9" fill="#FFFFFF" fill-opacity="0.5" font-size="30" font-weight="600" letter-spacing="-0.5" text-anchor="middle" aria-hidden="true">4</text>
      <text class="mast" x="736" y="142.5" fill="#1E1B16" font-size="30" font-weight="600" letter-spacing="-0.5" text-anchor="middle">4</text>
    </g>
  </g>
  <g class="cap-in c3" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="736" y="208" fill="#2B271F" font-size="11.5" font-weight="800" letter-spacing="1.3" text-anchor="middle">CLOUD PRODUCTS</text>
    <text x="736" y="227" fill="#6B6558" font-size="11.5" text-anchor="middle">quality leadership</text>
  </g>
  <g class="seal-in s4">
    <g class="beat b4">
      <circle cx="1008" cy="132" r="46" fill="url(#seal)" stroke="#9C7A12" stroke-opacity="0.95" stroke-width="1.6"/>
      <circle class="dash" cx="1008" cy="132" r="39" fill="none" stroke="#9C7A12" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="2 4"/>
      <text class="mast" x="1008" y="143.9" fill="#FFFFFF" fill-opacity="0.5" font-size="30" font-weight="600" letter-spacing="-0.5" text-anchor="middle" aria-hidden="true">3</text>
      <text class="mast" x="1008" y="142.5" fill="#1E1B16" font-size="30" font-weight="600" letter-spacing="-0.5" text-anchor="middle">3</text>
    </g>
  </g>
  <g class="cap-in c4" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="1008" y="208" fill="#2B271F" font-size="11.5" font-weight="800" letter-spacing="1.3" text-anchor="middle">CONTINENTS</text>
    <text x="1008" y="227" fill="#6B6558" font-size="11.5" text-anchor="middle">teams shipped with</text>
  </g>
  <rect width="1200" height="252" rx="28" fill="#1E1B16" filter="url(#grain)" style="mix-blend-mode:overlay" pointer-events="none"/>
</svg>
