    <text x="68" y="62" fill="#AFC1DD" font-size="18" font-weight="650" letter-spacing="2">CHICAGO · BUILDING IN PUBLIC</text>

    <text x="46" y="145" fill="#FFFFFF" font-size="54" font-weight="760" letter-spacing="-1.6">UMANG DHAWAN</text>
    <text x="48" y="193" fill="url(#accent)" font-size="26" font-weight="650">Technology consultant · open-source builder</text>
    <text x="48" y="244" fill="#C0CEE1" font-size="22">I turn complex ideas into reliable systems that ship.</text>

    <path d="M48 288h624" stroke="#FFFFFF" stroke-opacity="0.12"/>

