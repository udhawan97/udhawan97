<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">Umang Dhawan — technology consultant and open-source product builder</title>
  <desc id="desc">A mobile profile banner highlighting product delivery, quality engineering, cloud reliability, and applied AI.</desc>
  <defs>
    <linearGradient id="background" x1="24" y1="20" x2="690" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.58" stop-color="#0B1B31"/>
      <stop offset="1" stop-color="#182846"/>
    </linearGradient>
    <linearGradient id="accent" x1="48" y1="0" x2="610" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#61DAFB"/>
      <stop offset="0.52" stop-color="#8B9EFF"/>
      <stop offset="1" stop-color="#B98CFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(650 38) rotate(135) scale(430 360)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5E81FF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#5E81FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#C9D7F2" stroke-opacity="0.055"/>
    </pattern>
  </defs>

  <rect width="720" height="520" rx="28" fill="url(#background)"/>
  <rect width="720" height="520" rx="28" fill="url(#glow)"/>
  <rect width="720" height="520" rx="28" fill="url(#grid)"/>
  <rect x="0.75" y="0.75" width="718.5" height="518.5" rx="27.25" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.5"/>

