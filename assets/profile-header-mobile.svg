      <g transform="translate(48 326)">
        <rect width="296" height="64" rx="18" fill="#10263C" stroke="#61DAFB" stroke-opacity="0.38"/>
        <circle cx="32" cy="32" r="7" fill="#61DAFB"/>
        <text x="54" y="39">PRODUCT DELIVERY</text>
      </g>
      <g transform="translate(376 326)">
        <rect width="296" height="64" rx="18" fill="#14233E" stroke="#8B9EFF" stroke-opacity="0.4"/>
        <path d="M22 32l8 8 15-18" fill="none" stroke="#91A4FF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="58" y="39">QUALITY ENGINEERING</text>
      </g>
      <g transform="translate(48 414)">
