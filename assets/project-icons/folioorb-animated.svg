<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="title desc">
  <title id="title">FolioOrb animated app icon</title>
  <desc id="desc">A portfolio satellite orbits a softly pulsing center.</desc>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#28324a"/><stop offset="1" stop-color="#070a11"/></linearGradient>
    <radialGradient id="glow"><stop stop-color="#6fd6f0" stop-opacity=".34"/><stop offset="1" stop-color="#6fd6f0" stop-opacity="0"/></radialGradient>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="1.6"/></filter>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#tile)"/>
  <circle cx="50" cy="50" r="39" fill="url(#glow)"/>
  <g class="slow-orbit">
    <ellipse cx="50" cy="50" rx="32" ry="16" transform="rotate(-22 50 50)" fill="none" stroke="#97acec" stroke-opacity=".36" stroke-width="1.5"/>
  </g>
  <circle class="ring" cx="50" cy="50" r="28" fill="none" stroke="#97acec" stroke-opacity=".62" stroke-width="2"/>
  <g class="satellite">
    <circle cx="50" cy="22" r="6" fill="#6fd6f0" opacity=".45" filter="url(#soft)"/>
    <circle cx="50" cy="22" r="4" fill="#6fd6f0"/>
  </g>
  <circle class="core-glow" cx="50" cy="50" r="9" fill="#6fd6f0" opacity=".55" filter="url(#soft)"/>
  <circle class="core" cx="50" cy="50" r="6" fill="#6fd6f0"/>
  <style>
    .slow-orbit{animation:folio-turn 18s linear infinite;transform-origin:50px 50px}
    .satellite{animation:folio-turn 8s linear infinite;transform-origin:50px 50px}
    .ring{animation:folio-ring 4.8s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
    .core,.core-glow{animation:folio-pulse 3.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
    @keyframes folio-turn{to{transform:rotate(360deg)}}
    @keyframes folio-ring{50%{opacity:.78;transform:scale(1.08)}}
    @keyframes folio-pulse{50%{opacity:.9;transform:scale(1.16)}}
    @media (prefers-reduced-motion:reduce){.slow-orbit,.satellite,.ring,.core,.core-glow{animation:none!important}}
  </style>
</svg>
