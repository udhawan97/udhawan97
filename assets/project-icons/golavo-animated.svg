<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Golavo animated app icon</title>
  <desc id="desc">A sumi trajectory draws a G and arrives as a football beside a rising gold sun.</desc>
  <defs>
    <clipPath id="clip"><rect width="512" height="512" rx="112"/></clipPath>
    <pattern id="grain" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(18)"><circle cx="2" cy="2" r="1" fill="#101312" opacity=".35"/></pattern>
  </defs>
  <rect width="512" height="512" rx="112" fill="#101312"/>
  <g clip-path="url(#clip)">
    <g class="sun"><circle cx="352" cy="296" r="100" fill="#c9a227"/><circle cx="352" cy="296" r="100" fill="url(#grain)"/></g>
    <path d="M0 455Q64 421 128 455T256 455T384 455T512 455V512H0Z" fill="#18243a" opacity=".82"/>
  </g>
  <path class="trajectory" pathLength="1" d="M348 150A150 150 0 1 0 397 319C404 306 394 290 376 286" fill="none" stroke="#f4efe6" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="gold-seam" pathLength="1" d="M348 150A150 150 0 1 0 397 319C404 306 394 290 376 286" fill="none" stroke="#c9a227" stroke-width="5" stroke-linecap="round"/>
  <path d="M398 290V258H306V354" fill="none" stroke="#1a1a1a" stroke-width="12"/>
  <g class="ball">
    <circle cx="376" cy="286" r="16" fill="#f4efe6" stroke="#1a1a1a" stroke-width="3"/>
    <path d="M376 280 382 284 380 291 372 291 370 284Z" fill="#1a1a1a"/>
  </g>
  <style>
    .sun{animation:gol-sun 6.5s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
    .trajectory,.gold-seam{stroke-dasharray:1;stroke-dashoffset:0;animation:gol-draw 6.5s ease-in-out infinite}
    .gold-seam{animation-delay:.12s}
    .ball{animation:gol-arrive 6.5s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
    @keyframes gol-sun{50%{transform:scale(1.045)}}
    @keyframes gol-draw{0%,8%{stroke-dashoffset:1;opacity:0}12%{opacity:1}45%,88%{stroke-dashoffset:0;opacity:1}97%,100%{opacity:.15}}
    @keyframes gol-arrive{0%,39%{opacity:0;transform:scale(.25)}47%{opacity:1;transform:scale(1.16)}55%,88%{opacity:1;transform:scale(1)}97%,100%{opacity:0}}
    @media (prefers-reduced-motion:reduce){.sun,.trajectory,.gold-seam,.ball{animation:none!important}}
  </style>
</svg>
