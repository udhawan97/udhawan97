<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="title desc">
  <title id="title">Orifold animated app icon</title>
  <desc id="desc">A paper crane settles into its folds while a crease catches the light.</desc>
  <defs>
    <linearGradient id="tile" x1="0" y1="1" x2="1" y2="0">
      <stop stop-color="#2b4566"/>
      <stop offset="1" stop-color="#75bfd4"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#dfe5ea"/>
    </linearGradient>
    <clipPath id="clip"><rect width="100" height="100" rx="22"/></clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="100" height="100" fill="url(#tile)"/>
    <circle cx="76" cy="22" r="27" fill="#dff8ff" opacity=".12"/>
    <g class="crane">
      <path d="M54 49 22 13 41 53Z" fill="#f3f1ed"/>
      <path class="wing" d="M54 49 64 19 63 50Z" fill="#d9e0e6"/>
      <path d="M49 45 36 58 50 74Z" fill="#ececeb"/>
      <path d="M49 45 59 58 50 74Z" fill="url(#paper)"/>
      <path d="M54 50 70 29 64 55Z" fill="#f8f5ef"/>
      <path d="M70 29 84 29 72 33Z" fill="#e7e7e6"/>
      <path d="M41 57 14 75 39 68Z" fill="#efede9"/>
      <path d="M70 29 73 24 76 30Z" fill="#b73a3b"/>
      <circle cx="74.2" cy="29.2" r=".9" fill="#242c38"/>
      <path class="crease" d="M22 13 54 49 64 19M54 49 50 74" fill="none" stroke="#fff" stroke-linecap="round" stroke-width="1.2" opacity=".7"/>
    </g>
  </g>
  <style>
    .crane{animation:ori-float 7.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
    .wing{animation:ori-fold 7.2s ease-in-out infinite;transform-box:fill-box;transform-origin:100% 72%}
    .crease{stroke-dasharray:92;stroke-dashoffset:0;animation:ori-crease 7.2s ease-in-out infinite}
    @keyframes ori-float{0%,18%,100%{transform:translateY(0)}48%{transform:translateY(-1.8px)}72%{transform:translateY(.6px)}}
    @keyframes ori-fold{0%,12%,100%{transform:scaleX(1)}38%{transform:scaleX(.92) skewY(-1.5deg)}62%{transform:scaleX(1)}}
    @keyframes ori-crease{0%,12%{stroke-dashoffset:92;opacity:0}38%{opacity:.85}56%,100%{stroke-dashoffset:0;opacity:.35}}
    @media (prefers-reduced-motion:reduce){.crane,.wing,.crease{animation:none!important}}
  </style>
</svg>
