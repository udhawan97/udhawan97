<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="title desc">
  <title id="title">Codemble animated app icon</title>
  <desc id="desc">A lapis enso maps a learning galaxy around an amber spark of understanding.</desc>
  <defs>
    <radialGradient id="night" cx="50%" cy="34%" r="85%"><stop stop-color="#1a2750"/><stop offset=".55" stop-color="#101a3e"/><stop offset="1" stop-color="#070b1c"/></radialGradient>
    <linearGradient id="enso" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#8fb5f2"/><stop offset=".5" stop-color="#4a75cc"/><stop offset="1" stop-color="#3459a6"/></linearGradient>
    <radialGradient id="star"><stop stop-color="#fff1cd"/><stop offset=".5" stop-color="#f0a52f"/><stop offset="1" stop-color="#d1820e"/></radialGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#night)"/>
  <g class="sky" fill="#b6c2da"><circle cx="18" cy="20" r=".8"/><circle cx="83" cy="17" r=".7"/><circle cx="86" cy="82" r=".6"/><circle cx="15" cy="76" r=".7"/><circle cx="67" cy="12" r=".5"/></g>
  <path class="enso" pathLength="1" d="M76 70A33 33 0 1 1 77 30" fill="none" stroke="url(#enso)" stroke-width="6.4" stroke-linecap="round"/>
  <path class="spark" d="M50 36C51 44 56 49 64 50 56 51 51 56 50 64 49 56 44 51 36 50 44 49 49 44 50 36Z" fill="url(#star)"/>
  <circle cx="50" cy="50" r="1.4" fill="#fff3d6"/>
  <style>
    .sky{animation:code-sky 8s ease-in-out infinite;opacity:.28}
    .enso{stroke-dasharray:1;stroke-dashoffset:0;animation:code-map 7.4s ease-in-out infinite}
    .spark{animation:code-spark 4.6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
    @keyframes code-sky{50%{opacity:.55}}
    @keyframes code-map{0%,8%{stroke-dashoffset:1;opacity:.25}40%,100%{stroke-dashoffset:0;opacity:1}}
    @keyframes code-spark{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.14);opacity:1}}
    @media (prefers-reduced-motion:reduce){.sky,.enso,.spark{animation:none!important}}
  </style>
</svg>
