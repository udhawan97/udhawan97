<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">Umang Dhawan — technology consultant and open-source product builder</title>
  <desc id="desc">A mobile masthead in ink, slate, and gold, with four focus areas.</desc>
  <defs>
    <linearGradient id="panel" x1="40" y1="280" x2="680" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F1E2"/><stop offset="1" stop-color="#ECE0C4"/>
    </linearGradient>
    <linearGradient id="nameShimmer" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#1E1B16" stop-opacity="0"/>
      <stop offset="0.42" stop-color="#1E1B16" stop-opacity="0.06"/>
      <stop offset="0.58" stop-color="#9C7A12" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#9C7A12" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="nameClip">
      <text class="mast" x="42" y="146" font-size="56" font-weight="600" letter-spacing="-1">Umang Dhawan</text>
    </clipPath>
    <linearGradient id="background" x1="0" y1="0" x2="720" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF6EC"/><stop offset="0.58" stop-color="#F5EEDD"/><stop offset="1" stop-color="#EDE2C7"/>
    </linearGradient>
    <radialGradient id="indigoGlow" cx="0" cy="0" r="1" gradientTransform="translate(670 22) rotate(140) scale(510 320)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#46536B" stop-opacity="0.10"/><stop offset="1" stop-color="#46536B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="0" cy="0" r="1" gradientTransform="translate(70 510) rotate(-28) scale(430 180)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C9A227" stop-opacity="0.07"/><stop offset="1" stop-color="#C9A227" stop-opacity="0"/>
    </radialGradient>

    <!-- Paper grain: fine fractal noise, desaturated, laid over the whole sheet. -->
    <filter id="grain" x="0" y="0" width="100%" height="100%" filterUnits="objectBoundingBox">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="3" seed="7" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="d"/>
      <feComponentTransfer in="d" result="c"><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite in="c" in2="SourceGraphic" operator="in"/>
    </filter>

    <clipPath id="frameClip"><rect width="720" height="520" rx="28"/></clipPath>

    <style>
      @font-face {
        font-family: 'FrauncesMast';
        src: url(data:font/woff2;base64,) format('woff2');
        font-weight: 600; font-display: block;
      }
      .mast { font-family: 'FrauncesMast', Georgia, 'Times New Roman', serif; }

      /* One entrance, played once. Ambient loops wait until it lands. */
      .in-rule   { animation: draw-rule .72s cubic-bezier(.22,.61,.36,1) backwards; }
      .in-kick   { animation: rise .5s cubic-bezier(.22,.61,.36,1) .18s backwards; }
      .in-name   { animation: settle .78s cubic-bezier(.22,.61,.36,1) .3s backwards; }
      .in-sub    { animation: rise .55s cubic-bezier(.22,.61,.36,1) .52s backwards; }
      .in-tag    { animation: rise .55s cubic-bezier(.22,.61,.36,1) .62s backwards; }
      .in-accent { animation: grow .5s cubic-bezier(.22,.61,.36,1) .74s backwards; }
      .in-focus  { animation: rise .55s cubic-bezier(.22,.61,.36,1) .84s backwards; }
      .in-panel  { animation: panel .7s cubic-bezier(.22,.61,.36,1) .46s backwards; }
      .in-tile   { animation: rise .5s cubic-bezier(.22,.61,.36,1) backwards; }
      .in-tile.t1 { animation-delay: .72s; } .in-tile.t2 { animation-delay: .82s; }
      .in-tile.t3 { animation-delay: .92s; } .in-tile.t4 { animation-delay: 1.02s; }
      .in-issue  { animation: rise .6s cubic-bezier(.22,.61,.36,1) 1.1s backwards; }

      .in-rule, .in-kick, .in-name, .in-sub, .in-tag, .in-accent,
      .in-focus, .in-panel, .in-tile, .in-issue, .signal-dot, .name-shimmer { transform-box: fill-box; }
      .in-name, .in-panel { transform-origin: left center; }
      .in-accent { transform-origin: left center; }

      @keyframes draw-rule { from { stroke-dashoffset: var(--len); } to { stroke-dashoffset: 0; } }
      @keyframes rise   { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }
      @keyframes settle { from { opacity: 0; transform: translateY(12px) scale(.985); } to { opacity: 1; transform: none; } }
      @keyframes grow   { from { opacity: 0; transform: scaleX(0); } to { opacity: 1; transform: none; } }
      @keyframes panel  { from { opacity: 0; transform: translateY(10px) scale(.99); } to { opacity: 1; transform: none; } }

      /* Ambient loops, held back until the entrance resolves. */
      .signal-dot   { transform-origin: center; animation: signal 5.6s ease-in-out 1.4s infinite; }
      .name-shimmer { animation: name-shimmer 9s ease-in-out 2s infinite; }
      @keyframes signal {
        0%, 72%, 100% { opacity: .78; transform: scale(.88); }
        80%, 88% { opacity: 1; transform: scale(1.18); }
      }

      @media (prefers-reduced-motion: reduce) {
        .in-rule, .in-kick, .in-name, .in-sub, .in-tag, .in-accent,
        .in-focus, .in-panel, .in-tile, .in-issue { animation: none; }
        .in-rule { stroke-dashoffset: 0; }
        .signal-dot, .name-shimmer { animation: none; }
        .name-shimmer { opacity: 0; }
      }
    </style>
  </defs>

  <g clip-path="url(#frameClip)">
    <rect width="720" height="520" fill="url(#background)"/>
    <rect width="720" height="520" fill="url(#indigoGlow)"/>
    <path d="M525 -30 606 99 684 -26" fill="none" stroke="#46527A" stroke-opacity="0.07" stroke-width="2"/>
    <circle cx="607" cy="96" r="118" fill="none" stroke="#46527A" stroke-opacity="0.06"/>
    <path d="M-35 495C147 448 360 474 744 528" fill="none" stroke="#9C7A12" stroke-opacity="0.09" stroke-width="1.5"/>
    <rect class="in-panel" x="40" y="280" width="640" height="200" rx="22" fill="url(#panel)" stroke="#1E1B16" stroke-opacity="0.10"/>
  </g>

  <rect x="0.75" y="0.75" width="718.5" height="518.5" rx="27.25" fill="none" stroke="#1E1B16" stroke-opacity="0.14" stroke-width="1.5"/>
  <line class="in-rule" x1="42" y1="32" x2="678" y2="32" stroke="#9C7A12" stroke-opacity="0.6" stroke-width="1.5"
        stroke-dasharray="636" style="--len:636"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g class="in-kick">
      <circle class="signal-dot" cx="46" cy="57" r="4.5" fill="#9C7A12"/>
      <text x="61" y="63" fill="#6B6558" font-size="14" font-weight="700" letter-spacing="1.7">CHICAGO · BUILDING IN PUBLIC</text>
    </g>

    <g class="in-name">
      <text class="mast" x="42" y="147.6" fill="#FFFFFF" fill-opacity="0.5" font-size="56" font-weight="600" letter-spacing="-1" aria-hidden="true">Umang Dhawan</text>
    <text class="mast" x="42" y="146" fill="#1E1B16" font-size="56" font-weight="600" letter-spacing="-1">Umang Dhawan</text>
      <rect class="name-shimmer" x="-70" y="86" width="76" height="66" fill="url(#nameShimmer)" clip-path="url(#nameClip)"/>
    </g>

    <text class="in-sub" x="44" y="193" font-size="22"><tspan fill="#1E1B16" font-weight="650">Technology consultant</tspan><tspan fill="#A23A22" font-weight="700">  ✦  </tspan><tspan fill="#46527A" font-weight="600">Open-source builder</tspan></text>
    <text class="in-tag" x="44" y="233" fill="#6B6558" font-size="19">I turn complex ideas into reliable systems that ship.</text>

    <g class="in-accent">
      <rect x="44" y="253" width="55" height="3" rx="1.5" fill="#9C7A12"/>
      <rect x="106" y="253" width="18" height="3" rx="1.5" fill="#A23A22"/>
    </g>

    <g class="in-focus">
      <text x="66" y="316" fill="#9C7A12" font-size="12.5" font-weight="800" letter-spacing="1.7">FOCUS</text>
      <text x="654" y="316" fill="#6B6558" font-size="11.5" font-weight="700" letter-spacing="1.2" text-anchor="end">04 DISCIPLINES</text>
      <path d="M66 334h588M360 348v108M66 406h588" stroke="#1E1B16" stroke-opacity="0.08"/>
      <circle cx="70" cy="367" r="4" fill="#9C7A12"/>
      <text x="86" y="367" fill="#1E1B16" font-size="16" font-weight="750">PRODUCT SYSTEMS</text>
      <text x="86" y="388" fill="#6B6558" font-size="13.5">Strategy through shipped software</text>
      <circle cx="386" cy="367" r="4" fill="#46527A"/>
      <text x="402" y="367" fill="#1E1B16" font-size="16" font-weight="750">QUALITY ENGINEERING</text>
      <text x="402" y="388" fill="#6B6558" font-size="13.5">Evidence, reliability, and release</text>
      <circle cx="70" cy="438" r="4" fill="#6B6558"/>
      <text x="86" y="438" fill="#1E1B16" font-size="16" font-weight="750">CLOUD RELIABILITY</text>
      <text x="86" y="459" fill="#6B6558" font-size="13.5">Observable systems that hold up</text>
      <circle cx="386" cy="438" r="4" fill="#A23A22"/>
      <text x="402" y="438" fill="#1E1B16" font-size="16" font-weight="750">APPLIED AI</text>
      <text x="402" y="459" fill="#6B6558" font-size="13.5">Useful, bounded, and explainable</text>
    </g>
  </g>
  <rect width="720" height="520" rx="28" fill="#1E1B16" filter="url(#grain)" style="mix-blend-mode:overlay" pointer-events="none"/>
</svg>
