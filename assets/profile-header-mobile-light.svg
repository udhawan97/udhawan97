<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">Umang Dhawan — technology consultant and open-source product builder</title>
  <desc id="desc">A mobile masthead in ink, slate, and gold, with four focus areas listed below the name.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="720" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF6EC"/><stop offset="0.6" stop-color="#F5EEDD"/><stop offset="1" stop-color="#EDE2C7"/>
    </linearGradient>
    <linearGradient id="panel" x1="40" y1="280" x2="680" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F1E2"/><stop offset="1" stop-color="#ECE0C4"/>
    </linearGradient>
    <radialGradient id="indigoGlow" cx="0" cy="0" r="1" gradientTransform="translate(650 25) rotate(135) scale(430 330)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#46536B" stop-opacity="0.10"/><stop offset="1" stop-color="#46536B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nameShimmer" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#1E1B16" stop-opacity="0"/>
      <stop offset="0.42" stop-color="#1E1B16" stop-opacity="0.08"/>
      <stop offset="0.58" stop-color="#9C7A12" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#9C7A12" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="frameClip"><rect width="720" height="520" rx="28"/></clipPath>
    <clipPath id="nameClip">
      <text x="42" y="149" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="600" letter-spacing="-1.4">Umang Dhawan</text>
    </clipPath>
    <style>
      .signal-dot, .name-shimmer { transform-box: fill-box; }
      .signal-dot { transform-origin: center; animation: signal 5.6s ease-in-out infinite; }
      .name-shimmer { animation: name-shimmer 8.5s ease-in-out infinite; }
      @keyframes signal {
        0%, 72%, 100% { opacity: .78; transform: scale(.88); }
        80%, 88% { opacity: 1; transform: scale(1.18); }
      }
      @keyframes name-shimmer {
        0%, 78% { opacity: 0; transform: translateX(0); }
        82% { opacity: .7; }
        94% { opacity: .7; transform: translateX(430px); }
        98%, 100% { opacity: 0; transform: translateX(470px); }
      }
      @media (prefers-reduced-motion: reduce) {
        .signal-dot, .name-shimmer { animation: none; }
        .name-shimmer { opacity: 0; }
      }
    </style>
  </defs>

  <g clip-path="url(#frameClip)">
    <rect width="720" height="520" fill="url(#background)"/>
    <rect width="720" height="520" fill="url(#indigoGlow)"/>
    <path d="M525 -30 606 99 684 -26" fill="none" stroke="#46527A" stroke-opacity="0.08" stroke-width="2"/>
    <circle cx="607" cy="96" r="118" fill="none" stroke="#46527A" stroke-opacity="0.06"/>
    <path d="M-35 495C147 448 360 474 744 528" fill="none" stroke="#9C7A12" stroke-opacity="0.10" stroke-width="1.5"/>
    <rect x="40" y="280" width="640" height="200" rx="22" fill="url(#panel)" stroke="#1E1B16" stroke-opacity="0.10"/>
  </g>

  <rect x="0.75" y="0.75" width="718.5" height="518.5" rx="27.25" fill="none" stroke="#1E1B16" stroke-opacity="0.14" stroke-width="1.5"/>
  <line x1="42" y1="32" x2="678" y2="32" stroke="#9C7A12" stroke-opacity="0.6" stroke-width="1.5"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <circle class="signal-dot" cx="46" cy="57" r="4.5" fill="#9C7A12"/>
    <text x="61" y="63" fill="#6B6558" font-size="14" font-weight="700" letter-spacing="1.7">CHICAGO · BUILDING IN PUBLIC</text>
    <text x="678" y="63" fill="#8A7F63" font-size="11.5" font-weight="700" letter-spacing="1.2" text-anchor="end">SHIPS ON FRIDAYS</text>

    <text x="42" y="149" fill="#1E1B16" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="600" letter-spacing="-1.4">Umang Dhawan</text>
    <rect class="name-shimmer" x="-70" y="90" width="76" height="68" fill="url(#nameShimmer)" clip-path="url(#nameClip)"/>

    <text x="44" y="196" font-size="22"><tspan fill="#1E1B16" font-weight="650">Technology consultant</tspan><tspan fill="#A23A22" font-weight="700">  ✦  </tspan><tspan fill="#46527A" font-weight="600">Open-source builder</tspan></text>
    <text x="44" y="236" fill="#6B6558" font-size="19">I turn complex ideas into reliable systems that ship.</text>

    <rect x="44" y="256" width="55" height="3" rx="1.5" fill="#9C7A12"/>
    <rect x="106" y="256" width="18" height="3" rx="1.5" fill="#A23A22"/>

    <text x="66" y="316" fill="#2B271F" font-size="12.5" font-weight="800" letter-spacing="1.7">FOCUS</text>
    <text x="654" y="316" fill="#8A7F63" font-size="11.5" font-weight="700" letter-spacing="1.2" text-anchor="end">04 DISCIPLINES</text>
    <path d="M66 334h588M360 348v108M66 406h588" stroke="#1E1B16" stroke-opacity="0.10"/>

    <circle cx="70" cy="367" r="4" fill="#9C7A12"/>
    <text x="86" y="372" fill="#1E1B16" font-size="16" font-weight="750">PRODUCT SYSTEMS</text>
    <text x="86" y="393" fill="#6B6558" font-size="13.5">Strategy through shipped software</text>

    <circle cx="386" cy="367" r="4" fill="#46527A"/>
    <text x="402" y="372" fill="#1E1B16" font-size="16" font-weight="750">QUALITY ENGINEERING</text>
    <text x="402" y="393" fill="#6B6558" font-size="13.5">Evidence, reliability, and release</text>

    <circle cx="70" cy="438" r="4" fill="#6B6558"/>
    <text x="86" y="443" fill="#1E1B16" font-size="16" font-weight="750">CLOUD RELIABILITY</text>
    <text x="86" y="464" fill="#6B6558" font-size="13.5">Observable systems that hold up</text>

    <circle cx="386" cy="438" r="4" fill="#A23A22"/>
    <text x="402" y="443" fill="#1E1B16" font-size="16" font-weight="750">APPLIED AI</text>
    <text x="402" y="464" fill="#6B6558" font-size="13.5">Useful, bounded, and explainable</text>
  </g>
</svg>
